<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todoist — Pin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .status {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      background: rgba(255, 255, 255, 0.3);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
      margin-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Todoist — Pin</h1>
      <p>Fixe tarefas na tela</p>
    </div>

    <div class="status" id="status">Carregando...</div>

    <div class="actions">
      <button id="pinButton">📌 Fixar tarefa</button>
      <button id="settingsButton">⚙️ Configurações</button>
    </div>

    <div class="footer">Desenvolvido por Tihh Gonçalves</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
